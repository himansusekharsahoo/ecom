apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecom-frontend-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: ecom.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecom-frontend-service
                port:
                  number: 80